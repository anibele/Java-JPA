<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Lista de Categorias</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body id="topo" class="bg-light">
<div th:replace="~{fragments/layout :: header}"></div>

<main class="container py-4">
    <h1 class="h3 mb-3">Lista de Categorias</h1>

    <table class="table table-striped table-hover bg-white">
        <tr>
            <th>Id</th>
            <th>Nome</th>
            <th>Editar</th>
            <th>Excluir</th>
        </tr>

        <tr th:each="c : ${categorias}">
            <td th:text="${c.id}"></td>
            <td th:text="${c.nome}"></td>
            <td>
                <a type="button" class="btn btn-warning" th:href="@{/categoria/editar/{id}(id=${c.id})}">Editar</a>
            </td>
            <td>
                <a type="button" class="btn btn-danger" th:href="@{/categoria/deletar/{id}(id=${c.id})}">Excluir</a>
            </td>
        </tr>
    </table>

    <a type="button" class="btn btn-primary" href="/categoria/formulario">Nova Categoria</a>
</main>

<div th:replace="~{fragments/layout :: footer}"></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
