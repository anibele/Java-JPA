<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Formulario de Produto</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>
<body id="topo" class="bg-light">
<div th:replace="~{fragments/layout :: header}"></div>

<main class="container py-4">
    <div class="card shadow-sm border-0">
        <div class="card-body p-4">
            <h1 class="h4 mb-4">Cadastro de Produto</h1>

            <form th:action="@{/produto/salvar}" th:object="${produto}" method="post">
                <input th:field="*{id}" type="hidden"/>

                <div class="mb-3">
                    <label class="form-label">Nome</label>
                    <input class="form-control" type="text" th:field="*{nome}" required>
                </div>

                <div class="mb-3">
                    <label class="form-label">Descricao</label>
                    <input class="form-control" type="text" th:field="*{descricao}">
                </div>

                <div class="mb-3">
                    <label class="form-label">Valor</label>
                    <input class="form-control" type="number" step="0.01" th:field="*{valor}">
                </div>

                <div class="mb-3">
                    <label class="form-label">Quantidade</label>
                    <input class="form-control" type="number" th:field="*{quantidade}">
                </div>

                <div class="mb-3">
                    <label class="form-label">Imagem (URL)</label>
                    <input class="form-control" type="text" th:field="*{imagem}">
                </div>

                <div class="mb-4">
                    <label class="form-label">Categoria</label>
                    <select th:field="*{categoria.id}" class="form-select" required>
                        <option value="">Selecione uma categoria</option>
                        <option th:each="c : ${categorias}" th:value="${c.id}" th:text="${c.nome}"></option>
                    </select>
                </div>

                <div class="d-flex gap-2">
                    <input type="reset" class="btn btn-outline-secondary" value="Limpar">
                    <input type="submit" class="btn btn-primary" value="Salvar">
                </div>
            </form>
        </div>
    </div>
</main>

<div th:replace="~{fragments/layout :: footer}"></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
</body>
</html>
