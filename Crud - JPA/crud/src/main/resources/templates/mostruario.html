<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Mostruário de Produtos</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
        crossorigin="anonymous">
</head>

<body id="topo" class="bg-light">
    <div th:replace="~{fragments/layout :: header}"></div>

    <main class="container py-4">
        <div class="d-flex flex-wrap justify-content-between align-items-center mb-4 gap-2">
            <div>
                <h1 class="h3 mb-1">Mostruário de Produtos</h1>
                <p class="text-muted mb-0">Conheça os produtos disponíveis.</p>
            </div>
        </div>

        <div class="alert alert-info" th:if="${#lists.isEmpty(produtos)}">
            Nenhum produto cadastrado no momento.
        </div>

        <div class="row g-4" th:unless="${#lists.isEmpty(produtos)}">
            <div class="col-12 col-sm-6 col-lg-4" th:each="p : ${produtos}">
                <div class="card h-100 shadow-sm border-0">
                    <img th:src="${p.imagem != null and !#strings.isEmpty(p.imagem) ? p.imagem : 'https://via.placeholder.com/600x400?text=Sem+Imagem'}"
                        class="card-img-top" alt="Imagem do produto" style="height: 220px; object-fit: cover;">
                    <div class="card-body d-flex flex-column">
                        <div class="d-flex justify-content-between align-items-start mb-2 gap-2">
                            <h2 class="h5 card-title mb-0" th:text="${p.nome}"></h2>
                            <span class="badge text-bg-primary" th:text="${p.quantidade + ' un.'}"></span>
                        </div>

                        <p class="card-text text-muted small mb-3" th:text="${p.descricao}"></p>

                        <div class="mt-auto">
                            <p class="mb-1"><strong>Categoria:</strong> <span
                                    th:text="${p.categoria != null ? p.categoria.nome : 'Sem categoria'}"></span>
                            </p>
                            <p class="mb-0"><strong>Valor:</strong> R$ <span
                                    th:text="${#numbers.formatDecimal(p.valor, 1, 'POINT', 2, 'COMMA')}"></span>
                            </p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <div th:replace="~{fragments/layout :: footer}"></div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
</body>

</html>
